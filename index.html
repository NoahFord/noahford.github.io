<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>Historical Risk</title>
    <style>
      body{
        background-image: url(WaterBackground.PNG);
      }
      .navlower{
        overflow: hidden;
        background-color: #333;
        position: fixed;
        bottom: 0;
        width: 100%;
      }

      .navlower a, .dropdown{
        float: left;
        display: block;
        color: #f2f2f2;
        text-align: center;
        padding: 14px 16px;
        text-decoration: none;
        font-size: 17px;
      }

      .navlower a:hover, .dropdown:hover, .dropbtn, .dropbtn:focus{
        background: #f1f1f1;
        color: black;
      }

      .navlower-right {float: right;}

      .dropdown {
        float: left;
        overflow: hidden;
      }

      .dropdown-content {
        display: none;
        position: absolute;
        background-color: #f5f5f5;
        min-width: 200px;
        overflow: auto;
        box-shadow: 16px 16px 0px 16px rgba(0,0,0,0.3);
        z-index: 1;
      }

      .dropdown-content a {
        float; none;
        color: black;
        padding: 12px 16px;
        text-decoration: none;
        display: block;
        text-align: left;
      }

      .dropdown a:hover {background-color: #ddd;}

      .show {display: block;}
    </style>
  </head>
  <body>
    <div class="navlower">
      <a href="#general" class="active">General</a>
      <a href="#troops">Troops</a>
      <a href="#stars">Stars</a>
      <a href="#cards">Cards</a>
      <a href="#played">Cards in Play</a>
      <div class="navlower-right">
        <a href="#about">About</a>
      </div>
      <div class="dropdown">
        <button class = "dropbtn" onclick="lowerMenu()">Dropdown
          <i class="fa fa-caret-down"></i>
        </button>
        <div class="dropdown-content" id="myDropdown">
          <a href="#">Link 1</a>
          <a href="#">Link 2</a>
          <a href="#">Link 3</a>
        </div>
      </div>
    </div>
    <script>
      function lowerMenu() {
        document.getElementById("myDropdown").classList.toggle("show");
      }

      window.onclick = function(e) {
        if (!e.target.matches('.dropbtn')) {
          var myDropdown = document.getElementById("myDropdown");
          if (myDropdown.classList.contains('show')) {
            myDropdown.classList.remove('show');
          }
        }
      }
    </script>
    <img id = "board" src="RiskBoard.png" alt="RiskBoard" width = 65%>
  </body>
</html>
